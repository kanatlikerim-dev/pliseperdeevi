<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Prestige Life M2 Hesaplama</title>

<style>
body {
    font-family: Arial, sans-serif;
    background: #f5f5f5;
    display: flex;
    justify-content: center;
    padding: 20px;
}

.container {
    background: white;
    padding: 20px;
    border-radius: 12px;
    width: 100%;
    max-width: 450px;
    box-shadow: 0 5px 20px rgba(0,0,0,0.1);
}

h2 {
    text-align: center;
}

.subtitle {
    text-align: center;
    margin-bottom: 15px;
    color: #666;
    font-size: 14px;
}

input {
    width: 100%;
    padding: 10px;
    margin: 8px 0;
    border-radius: 8px;
    border: 1px solid #ddd;
    font-size: 16px;
}

button {
    width: 100%;
    padding: 12px;
    background: #111;
    color: white;
    border: none;
    border-radius: 8px;
    font-size: 16px;
    cursor: pointer;
}

button:hover {
    background: #333;
}

.result {
    margin-top: 15px;
    background: #f0f0f0;
    padding: 12px;
    border-radius: 8px;
    font-size: 14px;
    line-height: 1.6;
}
</style>
</head>

<body>

<div class="container">

<h2>Prestige Life</h2>
<div class="subtitle">M2 Hesaplama Sistemi</div>

<input id="width" placeholder="En (cm)">
<input id="height" placeholder="Boy (cm)">
<input id="qty" placeholder="Adet">
<input id="price" placeholder="M2 Fiyatı (TL)">
<input id="cargo" placeholder="Kargo Ücreti (TL)">

<button onclick="calculate()">Hesapla</button>

<div class="result" id="result"></div>

</div>

<script>
function roundUp10(x){
    return Math.ceil(x / 10) * 10;
}

function billableM2(m2){
    if(m2 <= 1) return 1;
    return Math.ceil(m2 * 10) / 10;
}

function calculate(){

    let w = parseFloat(document.getElementById("width").value);
    let h = parseFloat(document.getElementById("height").value);
    let qty = parseFloat(document.getElementById("qty").value);
    let price = parseFloat(document.getElementById("price").value);
    let cargo = parseFloat(document.getElementById("cargo").value);

    if(isNaN(w) || isNaN(h) || isNaN(qty) || isNaN(price) || isNaN(cargo)){
        document.getElementById("result").innerHTML = "Lütfen tüm alanları doldur.";
        return;
    }

    // İÇ HESAP (GİZLİ)
    let rw = roundUp10(w);
    let rh = roundUp10(h);

    let rawM2 = (rw * rh) / 10000;
    let billM2 = billableM2(rawM2);

    let materialTotal = billM2 * qty * price;
    let total = materialTotal + cargo;

    // SADE KULLANICI ÇIKTISI
    document.getElementById("result").innerHTML =
        "En: " + w + " cm<br>" +
        "Boy: " + h + " cm<br>" +
        "Adet: " + qty + "<br><br>" +

        "Malzeme Tutarı: " + materialTotal.toFixed(2) + " ₺<br>" +
        "Kargo: " + cargo.toFixed(2) + " ₺<br><br>" +

        "<b>TOPLAM: " + total.toFixed(2) + " ₺</b>";
}
</script>

</body>
</html>
